name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate tag
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tags must match vX.Y.Z or vX.Y.Z-suffix"
            exit 1
          fi
          git describe --tags --exact-match "${GITHUB_SHA}" >/dev/null

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          {
            echo "Automated release for ${GITHUB_REF_NAME}."
            echo
            echo "Artifacts include platform archives and SHA256 checksum files."
          } > "${notes_file}"
          gh release create "${GITHUB_REF_NAME}" \
            --draft \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${notes_file}"

  build:
    name: Build ${{ matrix.target }}
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: thala
          - os: macos-14
            target: aarch64-apple-darwin
            binary: thala
          - os: macos-13
            target: x86_64-apple-darwin
            binary: thala

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Ensure web/dist placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Build release artifact
        run: cargo build --profile dist --locked --target "${{ matrix.target }}"

      - name: Package artifact
        run: |
          set -euo pipefail
          asset="thala-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          staging="release-staging/thala-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/dist/${{ matrix.binary }}" "${staging}/"
          cp README.md LICENSE LICENSE-MIT LICENSE-APACHE NOTICE "${staging}/"
          tar -czf "${asset}" -C "release-staging" "$(basename "${staging}")"
          sha256sum "${asset}" > "${asset}.sha256"
          echo "RELEASE_ASSET=${asset}" >> "${GITHUB_ENV}"

      - name: Upload release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "${RELEASE_ASSET}" \
            "${RELEASE_ASSET}.sha256" \
            --clobber

  publish:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
