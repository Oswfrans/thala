name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  change-scope:
    name: Detect Change Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.scope.outputs.docs_only }}
      docs_changed: ${{ steps.scope.outputs.docs_changed }}
      rust_changed: ${{ steps.scope.outputs.rust_changed }}
      workflow_changed: ${{ steps.scope.outputs.workflow_changed }}
      base_sha: ${{ steps.scope.outputs.base_sha }}
      docs_files: ${{ steps.scope.outputs.docs_files }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash dev/scripts/ci/detect_change_scope.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [change-scope]
    if: needs.change-scope.outputs.docs_only != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.92.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Ensure web/dist placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy correctness gate
        run: cargo clippy --locked --all-targets -- -D clippy::correctness

  lint-strict-delta:
    name: Strict Delta Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [change-scope, lint]
    if: needs.change-scope.outputs.rust_changed == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.92.0
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Ensure web/dist placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Run strict delta lint gate
        run: bash dev/scripts/ci/rust_strict_delta_gate.sh
        env:
          BASE_SHA: ${{ needs.change-scope.outputs.base_sha }}

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [change-scope, lint]
    if: needs.change-scope.outputs.docs_only != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Ensure web/dist placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Install mold linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mold

      - name: Run tests
        run: cargo test --locked
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    needs: [change-scope, lint]
    if: |
      needs.change-scope.outputs.docs_only != 'true' &&
      (github.event_name == 'push' || matrix.target == 'x86_64-unknown-linux-gnu')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Install mold linker
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mold

      - name: Ensure web/dist placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Build release
        run: cargo build --profile ci --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

  check-all-features:
    name: Check (all features)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [change-scope, lint]
    if: needs.change-scope.outputs.docs_only != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libudev-dev

      - name: Ensure web/dist placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Check all features
        run: cargo check --all-features --locked

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [change-scope]
    if: needs.change-scope.outputs.docs_only != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Install cargo-audit (pinned)
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: Install cargo-deny (pinned)
        run: cargo install cargo-deny --version 0.18.5 --locked

      - name: Audit dependencies
        run: cargo audit

      - name: Check licenses and sources
        run: cargo deny check licenses sources

      - name: Scan git history for secrets
        run: bash dev/scripts/ci/secret_history_scan.sh

  check-32bit:
    name: Check (32-bit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [change-scope]
    if: needs.change-scope.outputs.docs_only != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.92.0
          targets: i686-unknown-linux-gnu
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install 32-bit libs
        run: sudo apt-get update -qq && sudo apt-get install -y gcc-multilib
      - name: Ensure web/dist placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep
      - name: Cargo check (32-bit, no default features)
        run: cargo check --target i686-unknown-linux-gnu --no-default-features

  docs-quality:
    name: Docs Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [change-scope]
    if: needs.change-scope.outputs.docs_changed == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: 20
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run docs quality gate
        run: bash dev/scripts/ci/docs_quality_gate.sh
        env:
          BASE_SHA: ${{ needs.change-scope.outputs.base_sha }}
          DOCS_FILES: ${{ needs.change-scope.outputs.docs_files }}

  # Composite status check — branch protection requires this single job.
  gate:
    name: CI Required Gate
    if: always()
    needs: [
      change-scope,
      lint,
      lint-strict-delta,
      test,
      build,
      check-all-features,
      security,
      check-32bit,
      docs-quality
    ]
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        env:
          HAS_FAILURE: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$HAS_FAILURE" == "true" ]]; then
            echo "::error::One or more upstream jobs failed or were cancelled"
            exit 1
          fi
