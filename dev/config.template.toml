# Thala config template — copy to ~/.thala/config.toml and fill in real values.
# Generated by: bash dev/setup.sh --configure
#
# See docs/THALA_SETUP.md for full documentation.

default_provider    = "opencode"
default_model       = "opencode/claude-sonnet-4-6"
api_key             = "REPLACE_OPENCODE_API_KEY"
default_temperature = 0.7

[orchestrator]
enabled                = true
discord_intake_enabled = false
product                = "REPLACE_PRODUCT_SLUG"
workspace_root         = "REPLACE_WORKSPACE_ROOT"
planning_model         = "claude-sonnet-4-6"
api_base_url           = "https://opencode.ai/zen/v1"

[channels_config.discord]
bot_token     = "REPLACE_DISCORD_BOT_TOKEN"
allowed_users = ["*"]
mention_only  = false
