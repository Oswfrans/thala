# Development Environment for Thala Agentic Testing
#
# Use this for:
# - Running the agent in a sandboxed environment
# - Testing dangerous commands safely
# - Developing new skills/integrations
#
# Usage:
#   cd dev && ./cli.sh up
#   or from root: ./dev/cli.sh up
name: thala
services:
  # ── The Agent (Development Image) ──
  # Builds from source using the 'dev' stage of the root Dockerfile
  thala:
    build:
      context: ..
      dockerfile: dev/docker/Dockerfile
      target: dev
    container_name: thala
    restart: unless-stopped
    environment:
      - THALA_GATEWAY_PORT=42617
      - SANDBOX_HOST=thala-sandbox
    secrets:
      - source: thala_env
        target: thala_env
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        if [ -f /run/secrets/thala_env ]; then
          set -a
          . /run/secrets/thala_env
          set +a
        fi
        exec thala gateway --port "${THALA_GATEWAY_PORT:-42617}" --host "[::]"
    volumes:
      # Mount single config file (avoids shadowing other files in .thala)
      - ../target/.thala/config.toml:/thala-data/.thala/config.toml
      # Mount shared workspace
      - ../playground:/thala-data/workspace
    ports:
      - "127.0.0.1:42617:42617"
    networks:
      - dev-net

  # ── The Sandbox (Ubuntu Environment) ──
  # A fully loaded Ubuntu environment for the agent to play in.
  sandbox:
    build:
      context: sandbox # Context relative to dev/
      dockerfile: Dockerfile
    container_name: thala-sandbox
    hostname: dev-box
    command: ["tail", "-f", "/dev/null"]
    working_dir: /home/developer/workspace
    user: developer
    environment:
      - TERM=xterm-256color
      - SHELL=/bin/bash
    volumes:
      - ../playground:/home/developer/workspace # Mount local playground
    networks:
      - dev-net

networks:
  dev-net:
    driver: bridge

secrets:
  thala_env:
    file: ../.env
